site_name: Math Notes
site_description: 数学证明与知识库

# ===== OI-Wiki 配色方案（直接复制）=====
theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/weather-sunny
        name: 切换暗色模式
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换亮色模式
  features:
    - navigation.tabs
    - navigation.instant
    - content.code.copy
  icon:
    logo: material/school

# ===== 数学公式支持 =====
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# ===== 极简导航（你自己加内容）=====
nav:
  - 首页: index.md
  - 数论:
    - 数学归纳法: math/induction.md
    - 素数: math/prime.md
    - 均值不等式: math/inequality.md
